<!-- One Row + Two Columns Layout Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
    <!-- Top Row -->
    <rect x="1" y="1" width="22" height="10" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="12" y="6" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="central" fill="currentColor">1</text>

    <!-- Left Column -->
    <rect x="1" y="13" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="6" y="18" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="central" fill="currentColor">2</text>

    <!-- Right Column -->
    <rect x="13" y="13" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="18" y="18" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" dominant-baseline="central" fill="currentColor">3</text>
</svg>